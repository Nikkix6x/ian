<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#000;
    color:white;

    font-family:'New Rocker', cursive;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    overflow:hidden;

}

.container{

    text-align:center;

    animation:fadeIn 1.5s ease;

}

p{

    font-size:2rem;

    line-height:1.8;

}

@keyframes fadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

</style>

</head>

<body>

<div class="container">

<p>

Grab a drink.<br><br>

Tap a patch.<br><br>

Spend some time with Ian.

</p>

</div>

</body>

</html>
