<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#ffffff;
font-family:'New Rocker', cursive;

}

.container{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;

text-align:center;

padding:30px 25px 50px;

}

img{

width:82%;
max-width:360px;

display:block;

margin:0 auto;

}

h1{

font-size:4rem;
font-weight:normal;

color:#111;

margin-top:-15px;
margin-bottom:12px;

}

h2{

font-size:1.7rem;
font-weight:normal;

color:#111;

margin-bottom:55px;

line-height:1.4;

}

.volume{
    font-size:1.2rem;
    margin-bottom:30px;
    color:#111;
}


button{

font-family:'New Rocker', cursive;

font-size:1.6rem;

padding:20px 36px;

background:#661321;

color:white;

border:4px solid #4a0d16;

border-radius:18px;

cursor:pointer;

box-shadow:
0 8px 25px rgba(0,0,0,.18);

transition:.3s;

}

button:hover{

transform:scale(1.03);

background:#7b1c2a;

}

.fade{

margin-top:-70px;

width:100%;
height:130px;

background:linear-gradient(

to bottom,

rgba(255,255,255,0),

rgba(255,255,255,1)

);

}

</style>

</head>

<body>

<div class="container">

<img src="images/portrait.PNG" alt="Ian">

<div class="fade"></div>

<h1>Ian</h1>

<h2>"The Maschine" Gregory Smith</h2>

<div class="volume">

Turn up your Volume!

</div>

<button>

Spend some time with Ian

</button>

</div>

</body>

</html>
