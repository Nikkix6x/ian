<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#ffffff;
    font-family:'New Rocker', cursive;
    color:#111;

}

.container{

    min-height:100vh;

    display:flex;
    flex-direction:column;

    align-items:center;

    text-align:center;

    padding:20px 20px 30px;

}

.portrait{

    width:78%;
    max-width:340px;

    display:block;

    margin:0 auto;

}

.fade{

    width:100%;
    height:110px;

    margin-top:-70px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,1)
    );

}

h1{

    font-size:3.9rem;
    font-weight:normal;

    margin-top:-6px;
    margin-bottom:4px;

}

h2{

    font-size:1.45rem;
    font-weight:normal;

    line-height:1.3;

    margin-bottom:28px;

}

.volume{

    font-size:1.15rem;

    margin-bottom:20px;

}

.spacer{

    flex:1;

}

/* ---------------- PATCH BUTTON ---------------- */

#startButton{

    background:none;
    border:none;

    width:92%;
    max-width:380px;

    margin-bottom:25px;

    padding:0;

    cursor:pointer;

}

#startButton img{

    width:100%;

    display:block;

    filter:drop-shadow(0 10px 18px rgba(0,0,0,.28));

    transition:.18s ease;

}

#startButton:hover img{

    transform:translateY(-2px);

}

#startButton:active img{

    transform:translateY(2px) scale(.98);

    filter:drop-shadow(0 4px 8px rgba(0,0,0,.18));

}

</style>

</head>

<body>

<div class="container">

<img class="portrait" src="images/portrait.PNG" alt="Ian">

<div class="fade"></div>

<h1>Ian</h1>

<h2>"The Maschine"<br>Gregory Smith</h2>

<div class="volume">

Turn up your Volume!

</div>

<div class="spacer"></div>

<button id="startButton">

<img src="images/button-patch.png" alt="Spend some time with Ian">

</button>

</div>

</body>

</html>
