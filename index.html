<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=EB+Garamond:wght@400&family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    font-family:'EB Garamond', serif;
}

.hero{

    position:relative;
    width:100vw;
    height:100vh;

}

.hero img{

    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;

}

.overlay{

    position:absolute;
    inset:0;

    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95) 0%,
        rgba(0,0,0,0.75) 30%,
        rgba(0,0,0,0.2) 60%,
        rgba(0,0,0,0) 100%
    );

}

.content{

    position:absolute;
    bottom:45px;
    left:50%;

    transform:translateX(-50%);

    width:90%;
    max-width:420px;

    text-align:center;

    color:white;

}

h1{

    font-family:'Cormorant Garamond', serif;
    font-size:3.2rem;
    margin-bottom:5px;

}

h2{

    font-family:'New Rocker', cursive;
    color:#b8b8b8;
    font-size:1.35rem;
    font-weight:normal;

    margin-bottom:24px;

}

p{

    line-height:1.6;
    font-size:1.08rem;
    margin-bottom:16px;

}

.note{

    color:#cccccc;
    margin-bottom:28px;

}

button{

    background:#651521;

    color:white;

    border:2px solid #8f2433;

    padding:16px 32px;

    border-radius:40px;

    font-size:1rem;

    cursor:pointer;

    font-family:inherit;

    transition:.3s;

    box-shadow:0 0 20px rgba(0,0,0,.45);

}

button:hover{

    background:#7b1c2a;

    transform:scale(1.04);

}

</style>

</head>

<body>

<div class="hero">

<img src="images/portrait.PNG" alt="Ian">

<div class="overlay"></div>

<div class="content">

<h1>Ian</h1>

<h2>"The Maschine" Gregory Smith</h2>

<p>
A quiet place to spend some time with Ian.
</p>

<p class="note">
🔊 Best experienced with your volume up.
</p>

<button>
❤️ Spend some time with Ian
</button>

</div>

</div>

</body>
</html>
