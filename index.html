<!DOCTYPE html>
<html lang="en">
    <button id="startButton">
    <img src="images/button-patch.png" alt="Spend some time with Ian">
</button>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:'New Rocker', cursive;
    color:#111;
    overflow:hidden;
}

.container{

    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;

    padding:20px 20px 35px;

}

.portrait{

    width:78%;
    max-width:340px;

    display:block;

    margin:0 auto;

}

.fade{

    width:100%;
    height:80px;

    margin-top:-45px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,1)
    );

}

h1{

    font-size:3.9rem;
    font-weight:normal;

    margin-top:-8px;

    margin-bottom:6px;

}

h2{

    font-size:1.5rem;
    font-weight:normal;

    line-height:1.35;

    margin-bottom:26px;

}

.volume{

    font-size:1.15rem;

    margin-bottom:20px;

}

.spacer{

    flex:1;

}

/* ---------- PATCH BUTTON ---------- */

button{

    font-family:'New Rocker', cursive;

    font-size:1.45rem;

    color:#f6f1e4;

    width:90%;
    max-width:340px;

    padding:18px;

    border:none;

    cursor:pointer;

    border-radius:8px;

    background:
    linear-gradient(
        135deg,
        #5b101b,
        #731927,
        #5b101b
    );

    box-shadow:
    inset 0 0 0 3px #2b070c,
    inset 0 0 0 6px #d9cab0,
    0 8px 20px rgba(0,0,0,.25);

    letter-spacing:1px;

    transition:.18s ease;

}

button:hover{

    transform:translateY(-2px);

}

button:active{

    transform:translateY(2px);

    box-shadow:
    inset 0 0 0 3px #2b070c,
    inset 0 0 0 6px #d9cab0,
    0 2px 8px rgba(0,0,0,.25);

}

/* stitched effect */

button::before{

    content:"";

    position:absolute;

}

</style>

</head>

<body>

<div class="container">

<img class="portrait" src="images/portrait.PNG" alt="Ian">

<div class="fade"></div>

<h1>Ian</h1>

<h2>"The Maschine"<br>Gregory Smith</h2>

<div class="volume">

Turn up your Volume!

</div>

<div class="spacer"></div>

<button>

Spend some time with Ian

</button>

</div>

</body>
</html>
