<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian's Battle Jacket</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    margin:0;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    overflow:hidden; 

   animation:fadeIn 1.3s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;
        transform:scale(.97);

    }

    to{

        opacity:1;
        transform:scale(1);

    }

}

h1{

    margin:30px 20px 20px;

    text-align:center;

    font-size:1.8rem;
    font-weight:normal;
    line-height:1.5;

}

.jacket{

    width:110vw;

    max-width:none;

    max-height:100vh;

    height:auto;

    display:block;

}

.jacket-container{

    position:relative;

    display:inline-block;

}

.patch{

    position:absolute;

    background:transparent;

   background:rgba(255,0,0,0.25);
   border:2px solid red;

}

#destroyerPatch{

    left:47.04%;

    top:33.62%;

    width:28%;

    height:17%;

    transform:translate(-50%, -50%);

}

</style>

</head>

<body>

<div class="jacket-container">

    <img class="jacket" src="images2/battle-jacket.jpg" alt="Ian's Battle Jacket">

    <button id="destroyerPatch" class="patch"></button>

</div>

<script>

const jacket = document.querySelector(".jacket-container");

jacket.addEventListener("click", function(event){

    const rect = jacket.getBoundingClientRect();

    const x = ((event.clientX - rect.left) / rect.width * 100).toFixed(2);
    const y = ((event.clientY - rect.top) / rect.height * 100).toFixed(2);

       console.log("X:", x + "%", "Y:", y + "%");

});

</script>

</script>

</body>

</html>
