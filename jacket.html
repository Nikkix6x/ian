<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian's Battle Jacket</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    margin:0;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    overflow:hidden;

    animation:fadeIn .8s ease;

}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

h1{

    margin:30px 20px 20px;

    text-align:center;

    font-size:1.8rem;
    font-weight:normal;
    line-height:1.5;

}

.jacket{

    width:100%;
    max-width:700px;

    height:auto;

    display:block;

    -webkit-mask-image:radial-gradient(circle, black 62%, transparent 92%);
    mask-image:radial-gradient(circle, black 62%, transparent 92%);

}

footer{

    margin:30px;

    font-size:1.2rem;

}

</style>

</head>

<body>

<img class="jacket" src="images2/battle-jacket.jpg" alt="Ian's Battle Jacket">

</body>

</html>
