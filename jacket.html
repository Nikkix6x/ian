<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ian's Battle Jacket</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    margin:0;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    overflow:hidden; 

   animation:fadeIn 1.3s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;
        transform:scale(.97);

    }

    to{

        opacity:1;
        transform:scale(1);

    }

}

h1{

    margin:30px 20px 20px;

    text-align:center;

    font-size:1.8rem;
    font-weight:normal;
    line-height:1.5;

}

.jacket{

    width:110vw;

    max-width:none;

    max-height:100vh;

    height:auto;

    display:block;

}

.jacket-container{

    position:relative;

    display:inline-block;

}

.patch{


    position:absolute;

    background:transparent;

    border:2px solid red;

    cursor:pointer;

}

#destroyerPatch{

    left:47.04%;

    top:33.62%;

    width:28%;

    height:17%;

    transform:translate(-50%, -50%);

}

</style>

</head>

<body>

<<body>

<div class="jacket-container">

    <img class="jacket" src="images2/battle-jacket.jpg" alt="Ian's Battle Jacket">

    <button id="destroyerPatch" class="patch"></button>

</div>

<script>

const video = document.createElement("video");

video.src = "video/destroyer.mp4";

video.controls = true;

video.style.position = "fixed";
video.style.top = "50%";
video.style.left = "50%";
video.style.transform = "translate(-50%, -50%)";
video.style.maxWidth = "90%";
video.style.maxHeight = "90%";
video.style.zIndex = "1000";
video.style.background = "black";

document.getElementById("destroyerPatch").addEventListener("click", function(){

    document.body.appendChild(video);

    video.currentTime = 0;

    video.play();

});

</script>

</body>

</html>
